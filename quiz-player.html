<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --green: #3ecf8e;
    --red: #e05a5a;
    --blue: #5a8fe0;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; overflow: hidden;
  }

  /* JOIN SCREEN */
  #join-screen { width: 100%; max-width: 400px; text-align: center; }
  .join-logo { font-family: var(--font-display); font-size: 56px; letter-spacing: 4px; color: var(--accent); margin-bottom: 4px; }
  .join-sub { color: var(--muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
  .join-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px 28px;
  }
  .join-card h2 { font-family: var(--font-display); font-size: 24px; letter-spacing: 2px; color: var(--accent); margin-bottom: 24px; }
  .join-field { margin-bottom: 16px; }
  .join-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; text-align: left; }
  .join-field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; color: var(--text); font-family: var(--font-body); font-size: 16px;
    outline: none; transition: border-color 0.2s; text-align: center; font-weight: 600;
  }
  .join-field input:focus { border-color: var(--accent); }
  .join-btn {
    width: 100%; padding: 16px; background: var(--accent); color: #000; border: none;
    border-radius: 10px; font-family: var(--font-display); font-size: 22px; letter-spacing: 2px;
    cursor: pointer; transition: transform 0.1s, opacity 0.2s; margin-top: 8px;
  }
  .join-btn:active { transform: scale(0.97); }
  .join-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

  /* WAITING SCREEN */
  #waiting-screen {
    display: none; width: 100%; max-width: 400px; text-align: center;
  }
  .waiting-avatar {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 40px; border: 3px solid;
  }
  .waiting-player-name { font-family: var(--font-display); font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; }
  .waiting-room { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
  .waiting-room span { color: var(--accent); }
  .waiting-dots { display: flex; gap: 8px; justify-content: center; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  .waiting-msg { color: var(--muted); font-size: 13px; letter-spacing: 1px; margin-top: 16px; }

  /* GAME SCREEN */
  #game-screen {
    display: none; width: 100%; max-width: 420px;
    min-height: 100vh; min-height: 100dvh;
    flex-direction: column;
  }

  /* Top bar */
  .game-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 12px;
  }
  .my-score-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .my-score-val { font-family: var(--font-display); font-size: 36px; color: var(--accent); line-height: 1; }
  .my-rank { text-align: right; }
  .my-rank-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .my-rank-val { font-family: var(--font-display); font-size: 36px; color: var(--text); line-height: 1; }

  /* Timer ring */
  .timer-ring-wrap { text-align: center; position: relative; width: 64px; margin: 0 auto; }
  .timer-ring { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-ring-fill { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .timer-ring-fill.urgent { stroke: var(--red); }
  .timer-ring-num {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: var(--font-display); font-size: 22px; color: var(--accent);
  }
  .timer-ring-num.urgent { color: var(--red); }

  /* Question area */
  .q-area { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 8px 0 16px; }
  .q-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; text-align: center; }
  .q-text-player {
    font-family: var(--font-display); font-size: 28px; letter-spacing: 0.5px; line-height: 1.2;
    text-align: center; margin-bottom: 28px;
  }

  /* Answer buttons */
  .answers-player { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ans-btn {
    background: var(--surface2); border: 2px solid var(--border); border-radius: 14px;
    padding: 16px 12px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-height: 80px; justify-content: center;
    -webkit-user-select: none; user-select: none;
  }
  .ans-btn:active { transform: scale(0.95); }
  .ans-btn.selected { border-color: var(--accent); background: rgba(240,192,64,0.12); }
  .ans-btn.correct { border-color: var(--green); background: rgba(62,207,142,0.15); animation: correctPulse 0.5s ease; }
  .ans-btn.wrong { border-color: var(--red); background: rgba(224,90,90,0.1); opacity: 0.6; }
  .ans-btn.correct-highlight { border-color: var(--green); background: rgba(62,207,142,0.15); }
  .ans-btn.disabled { pointer-events: none; }
  @keyframes correctPulse {
    0% { transform: scale(1); } 30% { transform: scale(1.04); } 60% { transform: scale(0.98); } 100% { transform: scale(1); }
  }
  .ans-letter {
    width: 32px; height: 32px; border-radius: 8px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 18px;
  }
  .ans-btn.selected .ans-letter { background: var(--accent); color: #000; }
  .ans-btn.correct .ans-letter { background: var(--green); color: #000; }
  .ans-text { font-size: 13px; text-align: center; line-height: 1.3; font-weight: 600; color: #ffffff; }

  /* Answered state */
  .answered-overlay {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px;
  }
  .answered-icon { font-size: 56px; margin-bottom: 16px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .answered-title { font-family: var(--font-display); font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; }
  .answered-sub { font-size: 14px; color: var(--muted); }

  /* Score delta animation */
  .score-delta-overlay {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-display); font-size: 72px; color: var(--green);
    pointer-events: none; z-index: 100; opacity: 0;
    text-shadow: 0 0 40px rgba(62,207,142,0.5);
  }
  .score-delta-overlay.show { animation: scoreFloat 1.5s ease forwards; }
  @keyframes scoreFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
  }

  /* Waiting for reveal */
  .wait-reveal {
    display: flex; flex-direction: column; align-items: center; padding: 20px 0;
    color: var(--muted); font-size: 13px; letter-spacing: 1px;
  }
  .wait-dots { display: flex; gap: 6px; margin-top: 12px; }
  .wait-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .wait-dot:nth-child(2) { animation-delay: 0.15s; }
  .wait-dot:nth-child(3) { animation-delay: 0.3s; }

  /* RESULT screen */
  #result-screen {
    display: none; width: 100%; max-width: 400px; text-align: center;
  }
  .result-trophy { font-size: 80px; margin-bottom: 16px; }
  .result-title { font-family: var(--font-display); font-size: 52px; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
  .result-score { font-family: var(--font-display); font-size: 80px; color: var(--text); line-height: 1; }
  .result-pts { font-size: 14px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .result-rank { font-size: 16px; color: var(--muted); }
  .result-rank strong { color: var(--accent); font-size: 24px; }

  /* Progress dots */
  .progress-dots { display: flex; gap: 4px; justify-content: center; padding: 8px 0 4px; }
  .prog-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .prog-dot.done { background: var(--muted); }
  .prog-dot.current { background: var(--accent); width: 18px; border-radius: 3px; }

  /* Players panel during game */
  .players-panel {
    padding: 8px 0 4px;
  }
  .players-panel-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; text-align: center; }
  .players-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .p-chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 10px; font-size: 11px; font-weight: 500; transition: all 0.3s;
  }
  .p-chip.answered { border-color: var(--green); background: rgba(62,207,142,0.1); }
  .p-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .p-chip.answered .p-chip-dot { background: var(--green); }

  /* RESULT screen */
  #result-screen {
    display: none; width: 100%; max-width: 400px; text-align: center;
  }
  .result-trophy { font-size: 80px; margin-bottom: 16px; }
  .result-title { font-family: var(--font-display); font-size: 52px; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
  .result-score { font-family: var(--font-display); font-size: 80px; color: var(--text); line-height: 1; }
  .result-pts { font-size: 14px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .result-rank { font-size: 16px; color: var(--muted); margin-bottom: 28px; }
  .result-rank strong { color: var(--accent); font-size: 24px; }

  /* Player scoreboard on result screen */
  .result-scoreboard { width: 100%; text-align: left; margin-bottom: 24px; }
  .result-scoreboard h4 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 12px; }
  .rsb-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px;
  }
  .rsb-row.me { border-color: var(--accent); background: rgba(240,192,64,0.08); }
  .rsb-rank { font-family: var(--font-display); font-size: 22px; width: 28px; text-align: center; color: var(--muted); flex-shrink: 0; }
  .rsb-row.me .rsb-rank { color: var(--accent); }
  .rsb-name { flex: 1; font-size: 13px; font-weight: 600; }
  .rsb-pts { font-family: var(--font-display); font-size: 22px; color: var(--accent); }

  /* In-game back button */
  .btn-back-game {
    width: 100%; padding: 10px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 12px; letter-spacing: 1px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-back-game:active { border-color: var(--accent); color: var(--accent); }

  /* Back to lobby button */
  .btn-lobby {
    width: 100%; padding: 15px; background: transparent; color: var(--accent);
    border: 2px solid var(--accent); border-radius: 12px;
    font-family: var(--font-display); font-size: 20px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
  }
  .btn-lobby:active { background: var(--accent); color: #000; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="join-screen">
  <div class="join-logo">QUIZ</div>
  <div class="join-sub">Multiplayer Kvíz</div>
  <div class="join-card">
    <h2>CSATLAKOZÁS</h2>
    <div class="join-field">
      <label>Szoba neve</label>
      <input type="text" id="room-input" placeholder="kvizjatek" autocomplete="off" autocapitalize="none">
    </div>
    <div class="join-field">
      <label>Neved</label>
      <input type="text" id="name-input" placeholder="pl. Anna" maxlength="20" autocomplete="off">
    </div>
    <button class="join-btn" onclick="joinGame()">BELÉPÉS →</button>
    <div class="join-error" id="join-error"></div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting-screen">
  <div class="waiting-avatar" id="w-avatar">A</div>
  <div class="waiting-player-name" id="w-name">—</div>
  <div class="waiting-room">Szoba: <span id="w-room">—</span></div>
  <div class="waiting-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

</div>

<!-- GAME -->
<div id="game-screen">
  <div class="game-topbar">
    <div>
      <div class="my-score-label">PONTOM</div>
      <div class="my-score-val" id="my-score">0</div>
    </div>
    <div class="timer-ring-wrap">
      <svg class="timer-ring" width="64" height="64" viewBox="0 0 64 64">
        <circle class="timer-ring-bg" cx="32" cy="32" r="28"/>
        <circle class="timer-ring-fill" id="timer-ring-fill" cx="32" cy="32" r="28"
          stroke-dasharray="175.9" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-ring-num" id="timer-ring-num">30</div>
    </div>
    <div class="my-rank">
      <div class="my-rank-label">HELYEZÉS</div>
      <div class="my-rank-val" id="my-rank">#—</div>
    </div>
  </div>

  <div class="progress-dots" id="progress-dots"></div>

  <div class="players-panel" id="players-panel">
    <div class="players-panel-title">JÁTÉKOSOK</div>
    <div class="players-chips" id="players-chips"></div>
  </div>

  <div class="q-area" id="q-area">
    <div class="q-cat" id="q-cat-player">—</div>
    <div class="q-text-player" id="q-text-player">Felkészülés...</div>
    <div class="answers-player" id="answers-player"></div>
  </div>

  <div style="padding: 8px 0 4px;">
    <button class="btn-back-game" onclick="backToLobby()">↺ Főmenü</button>
  </div>
</div>

<!-- RESULTS -->
<div id="result-screen">
  <div class="result-trophy" id="result-emoji">🏆</div>
  <div class="result-title">VÉGE!</div>
  <div class="result-score" id="final-score">0</div>
  <div class="result-pts">pont</div>
  <div class="result-rank" id="final-rank">Végső helyezés: <strong>#1</strong></div>
  <div class="result-scoreboard" id="result-scoreboard"></div>
  <button class="btn-lobby" onclick="backToLobby()">↺ FŐMENÜBE VISSZA</button>
</div>

<div class="score-delta-overlay" id="score-delta"></div>

<script>
// ============================================================
// STATE
// ============================================================
let db = null, roomRef = null, roomCode = '', playerId = '', playerName = '';
let myScore = 0, myColor = '', currentQIndex = -1, hasAnswered = false;
let timerInterval = null, timerValue = 30, totalTime = 30;
let questions = [], players = {};
let answeredNamesThisRound = new Set();
const LETTERS = ['A','B','C','D'];
const COLORS = ['#f0c040','#e05a2b','#3ecf8e','#5a8fe0','#c05ae0','#e05a8f','#5ae0d4','#e0c05a'];
const CIRCUMFERENCE = 175.9;

// Parse URL params
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// Auto-fill room from URL or default
window.addEventListener('load', () => {
  const room = getParam('room') || (typeof DEFAULT_ROOM !== 'undefined' ? DEFAULT_ROOM : '');
  if (room) document.getElementById('room-input').value = room;
  const saved = localStorage.getItem('quizPlayerName');
  if (saved) document.getElementById('name-input').value = saved;
});

// ============================================================
// JOIN
// ============================================================
async function joinGame() {
  const room = document.getElementById('room-input').value.trim();
  const name = document.getElementById('name-input').value.trim();
  const err = document.getElementById('join-error');
  err.textContent = '';

  if (!room) { err.textContent = 'Add meg a szoba nevét!'; return; }
  if (!name || name.length < 2) { err.textContent = 'Adj meg legalább 2 karakteres nevet!'; return; }

  roomCode = room;
  playerName = name;
  playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
  myColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  localStorage.setItem('quizPlayerName', name);

  try {
    if (!firebase.apps.length) {
      err.textContent = 'Firebase nincs beállítva! Töltsd ki a FIREBASE_CONFIG részt a player fájlban.';
      return;
    }
    db = firebase.database();
    roomRef = db.ref('rooms/' + roomCode);

    // Check room exists - ellenőrizzük hogy a host már beállította-e a szobát
    // Ha gameState nincs, megpróbálunk csatlakozni és várunk
    const snap = await roomRef.child('gameState').once('value');
    // Nem blokkoljuk a belépést ha nincs gameState - lehet hogy a host még tölt

    // Register player
    await roomRef.child('players').child(playerId).set({
      name: playerName, score: 0, color: myColor, joinedAt: firebase.database.ServerValue.TIMESTAMP
    });

    // Handle disconnect
    roomRef.child('players').child(playerId).onDisconnect().remove();

    showWaiting();
    setupGameListeners();

  } catch(e) {
    err.textContent = 'Hiba: ' + e.message;
  }
}

function initDemoMode(room, name) {
  // Demo without firebase config
  playerName = name;
  myColor = COLORS[0];
  showWaiting();
  setTimeout(() => {
    // Simulate game start after 2s
    const demoQ = {
      text: 'Ez egy demo kérdés — Firebase nélkül!',
      options: ['A válasz','B válasz','C válasz','D válasz'],
      category: 'Demo', time: 30, questionIndex: 0
    };
    showQuestion(demoQ, 0);
  }, 2000);
}

// ============================================================
// LISTENERS
// ============================================================
function setupGameListeners() {
  // Game state changes
  roomRef.child('gameState').on('value', snap => {
    const state = snap.val();
    if (!state) return;

    if (state.phase === 'waiting') {
      // New game started by host - if we're on result screen, stay on waiting
      if (document.getElementById('result-screen').style.display !== 'none') {
        backToLobby();
      }
    } else if (state.phase === 'question' && state.questionIndex !== currentQIndex) {
      currentQIndex = state.questionIndex;
      hasAnswered = false;
      answeredNamesThisRound = new Set();
      showQuestion(state.question, state.questionIndex);
    } else if (state.phase === 'revealed') {
      revealAnswers(state.correctAnswer);
    } else if (state.phase === 'ended') {
      showResults();
    }
  });

  // Score updates
  roomRef.child('players').child(playerId).child('score').on('value', snap => {
    const newScore = snap.val() || 0;
    if (newScore > myScore) {
      const diff = newScore - myScore;
      showScoreDelta('+' + diff);
    }
    myScore = newScore;
    document.getElementById('my-score').textContent = myScore;
  });

  // Ranking + player chips
  roomRef.child('players').on('value', snap => {
    players = snap.val() || {};
    updateRank();
    updatePlayersChips(answeredNamesThisRound);
  });

  // Track answers for player chips
  roomRef.child('answers').on('child_added', snap => {
    const ans = snap.val();
    if (ans && ans.playerName) {
      answeredNamesThisRound.add(ans.playerName);
      updatePlayersChips(answeredNamesThisRound);
    }
  });
  roomRef.child('answers').on('value', snap => {
    // Reset when answers node is cleared (new question)
    if (!snap.val()) {
      answeredNamesThisRound = new Set();
      updatePlayersChips(answeredNamesThisRound);
    }
  });

  // Questions for progress
  roomRef.child('questions').once('value', snap => {
    questions = Object.values(snap.val() || {});
    updateProgress();
  });
}

// ============================================================
// UI
// ============================================================
function showWaiting() {
  document.getElementById('join-screen').style.display = 'none';
  const ws = document.getElementById('waiting-screen');
  ws.style.display = 'block';
  document.getElementById('w-avatar').textContent = playerName[0].toUpperCase();
  document.getElementById('w-avatar').style.background = myColor + '22';
  document.getElementById('w-avatar').style.borderColor = myColor;
  document.getElementById('w-avatar').style.color = myColor;
  document.getElementById('w-name').textContent = playerName;
  document.getElementById('w-room').textContent = roomCode;
}

function showQuestion(q, idx) {
  document.getElementById('waiting-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';

  document.getElementById('q-cat-player').textContent = q.category || '';
  document.getElementById('q-text-player').textContent = q.text;

  // Answers
  const container = document.getElementById('answers-player');
  container.innerHTML = q.options.map((opt, i) => `
    <button class="ans-btn" id="abtn-${i}" onclick="submitAnswer(${i})">
      <div class="ans-letter">${LETTERS[i]}</div>
      <div class="ans-text">${opt}</div>
    </button>`).join('');

  document.getElementById('q-area').style.display = 'flex';
  document.getElementById('q-area').style.flexDirection = 'column';

  startPlayerTimer(q.time || 30);
  updateProgress(idx);
}

function submitAnswer(idx) {
  if (hasAnswered) return;
  hasAnswered = true;

  // Visual feedback
  document.querySelectorAll('.ans-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === idx) btn.classList.add('selected');
  });

  // Save to Firebase
  if (db && roomRef) {
    roomRef.child('answers').child(playerId).set({
      answer: idx,
      time: firebase.database.ServerValue.TIMESTAMP,
      playerName: playerName
    });
  }

  stopTimer();

  // Show waiting mini state
  const remaining = document.createElement('div');
  remaining.className = 'wait-reveal';
  remaining.innerHTML = `
    Válasz elküldve! Várakozás a megoldásra...
    <div class="wait-dots">
      <div class="wait-dot"></div><div class="wait-dot"></div><div class="wait-dot"></div>
    </div>`;
  document.getElementById('q-area').appendChild(remaining);
}

function revealAnswers(correctIdx) {
  stopTimer();
  document.querySelectorAll('.ans-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correctIdx) btn.classList.add('correct-highlight');
    else if (btn.classList.contains('selected')) btn.classList.add('wrong');
  });

  // Remove wait message
  const wr = document.querySelector('.wait-reveal');
  if (wr) wr.remove();
}

function showResults() {
  stopTimer();
  document.getElementById('game-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('final-score').textContent = myScore;

  // Rank
  const sorted = Object.values(players).sort((a,b) => (b.score||0)-(a.score||0));
  const rank = sorted.findIndex(p => p.name === playerName) + 1;
  document.getElementById('final-rank').innerHTML = 'Végső helyezés: <strong>#' + rank + '</strong>';

  const emojis = ['🏆','🥈','🥉','🎖️','⭐'];
  document.getElementById('result-emoji').textContent = emojis[Math.min(rank-1, emojis.length-1)];

  // Full scoreboard
  const medals = ['🥇','🥈','🥉'];
  let sbHTML = '<h4>RANGLISTA</h4>';
  sbHTML += sorted.map((p, i) => `
    <div class="rsb-row${p.name === playerName ? ' me' : ''}">
      <div class="rsb-rank">${medals[i] || (i+1) + '.'}</div>
      <div class="rsb-name">${p.name || 'Névtelen'}${p.name === playerName ? ' 👤' : ''}</div>
      <div class="rsb-pts">${p.score || 0} pt</div>
    </div>`).join('');
  document.getElementById('result-scoreboard').innerHTML = sbHTML;
}

function backToLobby() {
  // Reset local state
  hasAnswered = false;
  myScore = 0;
  currentQIndex = -1;

  // Reset score in firebase
  if (db && roomRef) {
    roomRef.child('players').child(playerId).child('score').set(0);
  }

  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';

  // Show waiting screen again
  const ws = document.getElementById('waiting-screen');
  ws.style.display = 'block';
  document.getElementById('my-score').textContent = '0';
  document.getElementById('my-rank').textContent = '#—';

  // Update waiting message
  const msg = ws.querySelector('.waiting-msg');
  if (msg) msg.textContent = 'Várakozás az új játék kezdésére...';
}

function updatePlayersChips(answeredSet) {
  const container = document.getElementById('players-chips');
  if (!container) return;
  container.innerHTML = Object.values(players).map(p => {
    const isAnswered = answeredSet && answeredSet.has ? answeredSet.has(p.name) : false;
    return `<div class="p-chip${isAnswered ? ' answered' : ''}">
      <div class="p-chip-dot"></div>${p.name}
    </div>`;
  }).join('');
}

function showScoreDelta(text) {
  const el = document.getElementById('score-delta');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
}

function updateRank() {
  const sorted = Object.values(players).sort((a,b) => (b.score||0)-(a.score||0));
  const rank = sorted.findIndex(p => p.name === playerName) + 1;
  document.getElementById('my-rank').textContent = '#' + (rank || '—');
}

function updateProgress(currentIdx) {
  const total = questions.length || 10;
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = Array.from({length: total}, (_,i) => {
    let cls = 'prog-dot';
    if (currentIdx !== undefined) {
      if (i < currentIdx) cls += ' done';
      else if (i === currentIdx) cls += ' current';
    }
    return `<div class="${cls}"></div>`;
  }).join('');
}

// ============================================================
// TIMER
// ============================================================
function startPlayerTimer(seconds) {
  stopTimer();
  timerValue = seconds;
  totalTime = seconds;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timerValue--;
    updateTimerUI();
    if (timerValue <= 0) {
      stopTimer();
      if (!hasAnswered) submitAnswer(-1); // time's up
    }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function updateTimerUI() {
  const pct = timerValue / totalTime;
  const offset = CIRCUMFERENCE * (1 - pct);
  const fill = document.getElementById('timer-ring-fill');
  const num = document.getElementById('timer-ring-num');
  fill.style.strokeDashoffset = offset;
  num.textContent = timerValue;
  const urgent = timerValue <= 10;
  fill.classList.toggle('urgent', urgent);
  num.classList.toggle('urgent', urgent);
}
</script>
</body>
</html>
